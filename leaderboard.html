  :root{
    --bg:#eae6e1;--card:#fff;--ink:#111;--muted:#7a766e;--line:#e4dfd5;--line-strong:#d6d0c5;
    --accent:#fecc07;--accent-tint:rgba(254,204,7,.16);--dark:#000;--red:#c0392b;--ok:#3f7d54;
    --gold:#f0b400;--gold-ink:#a67c00;--silver:#a7a196;--silver-ink:#6f6a60;--bronze:#c98a5e;--bronze-ink:#9c623a;
    --shadow:0 1px 2px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
    --shadow-lift:0 10px 26px rgba(0,0,0,.12);
    --r-control:12px;--r-card:16px;--r-pill:999px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}}
  html,body{margin:0}
  body{font-family:"FunkisA","Avenir Next","Avenir",Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);
       line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
  .wrap{max-width:720px;margin:0 auto;padding:48px 16px 64px}

  header{text-align:center;margin-bottom:8px}
  .logo{line-height:0;margin-bottom:10px}
  .logo img{height:44px;width:auto;display:inline-block}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0}
  h1{margin:4px 0 0;font-size:34px;font-weight:700;line-height:1.05;text-wrap:balance}
  .status{display:inline-flex;gap:8px;align-items:center;margin-top:14px;flex-wrap:wrap;justify-content:center}
  .chip{font-size:12px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line-strong);
        border-radius:var(--r-pill);padding:6px 12px}
  .chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-right:6px;vertical-align:middle}
  .chip .dot.stale{background:var(--muted)}

  /* tabs */
  .tabs{display:flex;gap:8px;justify-content:center;margin-top:18px}
  .tab{font-family:inherit;font-size:14px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line-strong);
       border-radius:var(--r-pill);padding:9px 16px;cursor:pointer}
  .tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tab:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(254,204,7,.5)}

  /* ---------- podium (F1 pedestal, no photos) ---------- */
  .podium-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);
               padding:26px 14px 0;margin-top:20px;overflow:hidden}
  .podium{display:flex;justify-content:center;align-items:flex-end;gap:10px}
  .pod{flex:1 1 0;max-width:180px;min-width:0;display:flex;flex-direction:column;align-items:center;text-align:center}
  .pod .crown{font-size:26px;line-height:1;margin-bottom:4px;height:28px}
  .pod .pname{font-weight:700;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
  .pod .pscore{font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1;margin-top:2px}
  .pod .ptime{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:2px}
  .pod .ped{width:100%;margin-top:12px;border-radius:14px 14px 0 0;display:flex;align-items:flex-start;justify-content:center;
            padding-top:14px;box-shadow:inset 0 2px 0 rgba(255,255,255,.4)}
  .pod .pnum{font-weight:700;color:#fff;line-height:1;text-shadow:0 1px 1px rgba(0,0,0,.12)}
  .pod.p1 .ped{height:134px;background:linear-gradient(180deg,#ffd23a,var(--gold))}
  .pod.p2 .ped{height:98px;background:linear-gradient(180deg,#bdb8ad,var(--silver))}
  .pod.p3 .ped{height:80px;background:linear-gradient(180deg,#d89e73,var(--bronze))}
  .pod.p1 .pnum{font-size:54px} .pod.p2 .pnum,.pod.p3 .pnum{font-size:40px}
  .pod.p1 .pname{font-size:18px} .pod.p2 .pname,.pod.p3 .pname{font-size:15px}
  .pod.p1 .pscore{font-size:24px;color:var(--gold-ink)}
  .pod.p2 .pscore{font-size:20px;color:var(--silver-ink)} .pod.p3 .pscore{font-size:20px;color:var(--bronze-ink)}
  @media (prefers-reduced-motion:no-preference){
    @keyframes riseUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .pod{animation:riseUp .36s ease both} .pod.p1{animation-delay:.05s}
  }

  /* ---------- standings list (rank 4+) ---------- */
  .list-label{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:center;margin:24px 4px 2px}
  .board{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
       border-radius:var(--r-card);padding:13px 18px;box-shadow:var(--shadow)}
  .row .rnum{flex:none;width:30px;text-align:center;color:var(--muted);font-weight:700;font-variant-numeric:tabular-nums;font-size:17px}
  .row .who{min-width:0;flex:1}
  .row .who .nm{font-weight:700;font-size:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .who .sub{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .row .sc{flex:none;text-align:right;font-weight:700;font-size:19px;font-variant-numeric:tabular-nums}
  @media (prefers-reduced-motion:no-preference){
    @keyframes rowIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .row{animation:rowIn .26s ease both}
  }

  /* ---------- question review (most missed) ---------- */
  .review{margin-top:20px;display:flex;flex-direction:column;gap:12px}
  .qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);padding:18px 20px}
  .qcard.hardest{border-color:var(--red)}
  .qtop{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .qtag{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-variant-numeric:tabular-nums}
  .pill-hard{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:rgba(192,57,43,.12);color:var(--red);border-radius:var(--r-pill);padding:3px 9px}
  .qq{font-weight:700;font-size:17px;margin:0 0 14px;line-height:1.3;text-wrap:balance}
  .obar{position:relative;border:1.5px solid var(--line-strong);border-radius:var(--r-control);padding:11px 14px;margin-bottom:8px;overflow:hidden;display:flex;align-items:center;gap:10px}
  .obar .ofill{position:absolute;left:0;top:0;bottom:0;background:var(--accent-tint);z-index:0;transition:width .4s ease}
  .obar.correct{border-color:var(--ok)}
  .obar.correct .ofill{background:rgba(63,125,84,.16)}
  .obar .olabel{position:relative;z-index:1;font-size:14px;font-weight:600;flex:1;min-width:0}
  .obar.correct .olabel{color:var(--ok);font-weight:700}
  .obar .ocount{position:relative;z-index:1;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;flex:none}
  .qn{margin:8px 0 0;font-size:13px;color:var(--muted)}
  .qn b{color:var(--ink)}
  .qwhy{margin:12px 0 0;font-size:13.5px;color:var(--ink);background:var(--accent-tint);border-radius:12px;padding:11px 13px;line-height:1.5}
  .qwhy b{font-weight:700}
  .obar{cursor:pointer}
  .obar:hover{border-color:var(--ink)}
  .obar:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(254,204,7,.45)}
  .obar .ochev{position:relative;z-index:1;color:var(--muted);font-size:12px;flex:none;margin-left:2px}
  .names{display:none;flex-wrap:wrap;gap:6px;margin:-2px 0 10px;padding:0 2px}
  .names.open{display:flex}
  .who-chip{font-size:12.5px;font-weight:600;background:var(--accent-tint);color:var(--ink);border-radius:var(--r-pill);padding:5px 11px}
  .names.correct .who-chip{background:rgba(63,125,84,.14);color:var(--ok)}
  .who-none{font-size:12.5px;color:var(--muted);font-style:italic;padding:3px 2px}

  /* ---------- states ---------- */
  .state{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--shadow);
         padding:48px 24px;text-align:center;margin-top:20px}
  .state .big{font-size:40px;line-height:1;margin-bottom:12px}
  .state h2{margin:0 0 6px;font-size:20px;font-weight:700}
  .state p{margin:0;color:var(--muted);font-size:15px}
  .state button{font-family:inherit;margin-top:16px;border:1px solid var(--line-strong);background:#fff;color:var(--ink);
                border-radius:var(--r-control);padding:12px 20px;font-size:15px;font-weight:700;cursor:pointer}
  .state button:hover{border-color:var(--ink)}
  .skel{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:14px 18px;
        box-shadow:var(--shadow);height:64px;position:relative;overflow:hidden}
  .skel::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,0,0,.04),transparent);transform:translateX(-100%)}
  @media (prefers-reduced-motion:no-preference){ .skel::after{animation:sweep 1.3s infinite} @keyframes sweep{to{transform:translateX(100%)}} }
  @media (max-width:560px){ .wrap{padding-left:12px;padding-right:12px;padding-top:calc(40px + env(safe-area-inset-top, 0px))} .qcard{padding:16px 15px} .obar{padding:11px 12px} .podium-wrap{padding-left:8px;padding-right:8px} }
  .hidden{display:none}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}
</style>
</head>

<script>
/* Google Apps Script /exec URL (the READ endpoint). Fill in after deploying apps_script.gs. */
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbypkw5U2knawbPOf2YFyz7Zlsuy0uBg_YTd7Q4il2rrmrrXiZ2Z49jGe2De90I5nW4GVQ/exec";
const REFRESH_MS = 5000;

/* Keep in sync with quiz.html QUESTIONS: same order (Q1..Qn) + EXACT correct-answer text.
   Only the correct string is needed here — option spreads are read from the sheet data. */
const QMETA = [
  { q:"Every Dory dish here is pescatarian, except one. Which one has something extra in it?", correct:"Thai-Canton Steamed Dory", why:"It\u2019s steamed with chicken stock concentrate, which is the giveaway. That bit of chicken makes it non-pescatarian, unlike the other Dory dishes that use a vegetarian stock." },
  { q:"How much do we need to bring in per month, at current fixed cost, just to break even?", correct:"~$2.2M" },
  { q:"Which of these chicken dishes secretly contains shellfish?", correct:"Ayam Kampung Masak Merah", why:"Its masak merah (sambal) base is built on belacan / dried shrimp, so it carries a shellfish allergen. The other chicken dishes don\u2019t." },
  { q:"Space planning time. What are the dimensions of a GS table? (L × H × W, in cm)", correct:"L180 × H73 × W75" },
  { q:"Which new dish is replacing Grilled Farm Fresh Chicken on the core buffet?", correct:"Smoked Paprika Lemon Chicken", why:"GFFC is replaced by Smoked Paprika Lemon Chicken on the buffet. Paprika Lemon Chicken Aglio Olio is the meal-box version, which is the trap." },
  { q:"Which of these is a regular side, NOT a premium side?", correct:"Indonesian Spiced Potato Cake", why:"Indonesian Spiced Potato Cake sits under regular Sides. Satay, Takoyaki and Truffle Four-Cheese Mac are all Premium sides." },
  { q:"What are the dimensions of a chafing dish with insert? (L × H × W, in cm)", correct:"L57 × H23 × W37" },
  { q:"What did June sales close at?", correct:"~$1.96M" },
  { q:"They all sound plant-based, but only one is actually vegan. Which?", correct:"Actually Plant-Based Chicken Gyoza", why:"Only the gyoza is tagged vegan. Plant-Based Beef Lasagna and Truffle Four-Cheese Mac contain dairy, so they\u2019re vegetarian, not vegan." },
  { q:"Last one. One of our 5 principles is about learning. Which is the exact wording?", correct:"Be open, curious, and committed to learning" }
];

let lastRaw = null;   // last good raw rows
let lastFetch = 0;
let activeView = 'board';
let openKeys = new Set();   // which answer bars are expanded (name lists), preserved across refreshes

function $(id){return document.getElementById(id);}
function fmtTime(sec){ sec=Math.max(0,Math.round(+sec||0)); const m=Math.floor(sec/60); return m+":"+String(sec%60).padStart(2,'0'); }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function num(v){ const n=parseFloat(v); return isNaN(n)?0:n; }

function normalize(rows){
  return rows.map(r=>({ name:String(r['Name']||'').trim(), score:num(r['Score']), total:num(r['Total'])||10, dur:num(r['Duration (s)']) })).filter(r=>r.name);
}
function rank(list){ return list.slice().sort((a,b)=> (b.score-a.score) || (a.dur-b.dur) || a.name.localeCompare(b.name)); }
function showState(which){ ['content','loading','empty','error'].forEach(id=>$(id).classList.toggle('hidden', id!==which)); }
function setView(v){
  activeView=v;
  $('tabBoard').classList.toggle('active', v==='board');
  $('tabReview').classList.toggle('active', v==='review');
  $('viewBoard').classList.toggle('hidden', v!=='board');
  $('viewReview').classList.toggle('hidden', v!=='review');
  $('foot').textContent = v==='board'
    ? 'Ranked by correct answers, then fastest time. Refreshes automatically.'
    : 'Hardest first. Tap any answer to see who picked it. The correct answer is in green.';
}

/* ---------- leaderboard view ---------- */
function podColumn(entry, place){
  return '<div class="pod p'+place+'">'
    + '<div class="crown"></div>'
    + '<div class="pname">'+esc(entry.name)+'</div>'
    + '<div class="pscore">'+entry.score+'/'+entry.total+'</div>'
    + '<div class="ptime">'+fmtTime(entry.dur)+'</div>'
    + '<div class="ped"><span class="pnum">'+place+'</span></div>'
    + '</div>';
}
function renderBoard(rawRows){
  const ranked = rank(normalize(rawRows));
  const top = ranked.slice(0,3);
  const order = top.length===1 ? [[top[0],1]] : top.length===2 ? [[top[1],2],[top[0],1]] : [[top[1],2],[top[0],1],[top[2],3]];
  $('podium').innerHTML = order.map(function(o){ return podColumn(o[0],o[1]); }).join('');
  const rest = ranked.slice(3);
  $('board').innerHTML = rest.map(function(r,i){
    return '<div class="row">'
      + '<span class="rnum">'+(i+4)+'</span>'
      + '<span class="who"><div class="nm">'+esc(r.name)+'</div><div class="sub">'+fmtTime(r.dur)+'</div></span>'
      + '<span class="sc">'+r.score+'/'+r.total+'</span>'
      + '</div>';
  }).join('');
  var hasRest = rest.length>0;
  $('board').style.display = hasRest ? '' : 'none';
  $('listLabel').style.display = hasRest ? '' : 'none';
  $('countChip').textContent = ranked.length + (ranked.length===1?' player':' players');
}

/* ---------- most-missed view ---------- */
function renderReview(rawRows){
  var stats = QMETA.map(function(m, i){
    var ansKey='Q'+(i+1)+' answer', corKey='Q'+(i+1)+' correct';
    var answered = rawRows.filter(function(r){ return String(r[ansKey]||'').trim()!==''; });
    var tally={}, pickers={};
    answered.forEach(function(r){ var a=String(r[ansKey]).trim(); tally[a]=(tally[a]||0)+1; (pickers[a]=pickers[a]||[]).push(String(r['Name']||'').trim()); });
    var correctCount = answered.filter(function(r){ return String(r[corKey])==='1'; }).length;
    var n = answered.length;
    return { qi:i, q:m.q, correct:m.correct, why:m.why, n:n, correctCount:correctCount, wrongPct: n? (1-correctCount/n):-1, tally:tally, pickers:pickers };
  });
  // hardest first; questions nobody answered (n=0) sink to the bottom
  stats.sort(function(a,b){ return (b.wrongPct-a.wrongPct) || (b.n-a.n); });

  $('review').innerHTML = stats.map(function(s, idx){
    var opts = Object.keys(s.tally);
    if(opts.indexOf(s.correct)===-1) opts.push(s.correct);   // always show the correct answer
    opts.sort(function(a,b){ return (s.tally[b]||0)-(s.tally[a]||0); });
    var rightPct = s.n ? Math.round(s.correctCount/s.n*100) : 0;
    var hardest = idx===0 && s.n>0 && s.wrongPct>0;
    var bars = opts.map(function(o){
      var cnt=s.tally[o]||0, pct = s.n? Math.round(cnt/s.n*100):0;
      var isCorrect = o===s.correct;
      var names = s.pickers[o] || [];
      var key = s.qi + '|' + o;
      var open = openKeys.has(key);
      var chips = names.length
        ? names.map(function(nm){ return '<span class="who-chip">'+esc(nm)+'</span>'; }).join('')
        : '<span class="who-none">No one picked this</span>';
      return '<div class="obar'+(isCorrect?' correct':'')+'" role="button" tabindex="0" data-key="'+esc(key)+'">'
        + '<div class="ofill" style="width:'+pct+'%"></div>'
        + '<span class="olabel">'+esc(o)+'</span>'
        + '<span class="ocount">'+cnt+' · '+pct+'%</span>'
        + '<span class="ochev">'+(open?'▾':'▸')+'</span>'
        + '</div>'
        + '<div class="names'+(isCorrect?' correct':'')+(open?' open':'')+'">'+chips+'</div>';
    }).join('');
    return '<div class="qcard'+(hardest?' hardest':'')+'">'
      + '<div class="qtop">'
        + '<span class="qtag">'+(s.n? rightPct+'% got it right' : 'No answers yet')+'</span>'
        + (hardest?'<span class="pill-hard">Trickiest</span>':'')
      + '</div>'
      + '<p class="qq">'+esc(s.q)+'</p>'
      + bars
      + '<p class="qn">Correct answer: <b>'+esc(s.correct)+'</b></p>'
      + (s.why ? '<p class="qwhy"><b>Why:</b> '+esc(s.why)+'</p>' : '')
      + '</div>';
  }).join('');
}

/* ---------- data + state ---------- */
function renderAll(rawRows){
  var valid = rawRows.filter(function(r){ return String(r['Name']||'').trim(); });
  if(!valid.length){ showState('empty'); return; }
  lastRaw = valid;
  renderBoard(valid);
  renderReview(valid);
  showState('content');
  setView(activeView);
}
function setUpdated(ok){ $('dot').className = 'dot' + (ok?'':' stale'); }
function tickAgo(){ if(!lastFetch) return; const s=Math.round((Date.now()-lastFetch)/1000);
  $('updText').textContent = s<2 ? 'just now' : ('updated '+s+'s ago'); }

async function load(){
  if(!WEBAPP_URL){
    $('errMsg').textContent = 'Set WEBAPP_URL to your Apps Script /exec URL to go live.';
    showState('error'); $('updText').textContent='not connected'; setUpdated(false); return;
  }
  try{
    const res = await fetch(WEBAPP_URL, {cache:'no-store'});
    const data = await res.json();
    if(!data || !data.ok) throw new Error(data && data.error || 'bad response');
    lastFetch = Date.now(); setUpdated(true); tickAgo();
    renderAll(data.rows||[]);
  }catch(err){
    setUpdated(false);
    if(lastRaw){ tickAgo(); return; }
    $('errMsg').textContent = 'Trying again shortly… ('+String(err).slice(0,80)+')';
    showState('error');
  }
}

function toggleBar(bar){
  var key=bar.getAttribute('data-key');
  if(openKeys.has(key)) openKeys.delete(key); else openKeys.add(key);
  var isOpen=openKeys.has(key);
  var names=bar.nextElementSibling; if(names) names.classList.toggle('open', isOpen);
  var chev=bar.querySelector('.ochev'); if(chev) chev.textContent = isOpen ? '▾' : '▸';
}
$('review').addEventListener('click', function(e){ var b=e.target.closest('.obar'); if(b) toggleBar(b); });
$('review').addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ var b=e.target.closest('.obar'); if(b){ e.preventDefault(); toggleBar(b);} } });
$('tabBoard').onclick = function(){ setView('board'); };
$('tabReview').onclick = function(){ setView('review'); };
$('retry').onclick = load;
load();
setInterval(load, REFRESH_MS);
setInterval(tickAgo, 1000);
</script>
</body>
